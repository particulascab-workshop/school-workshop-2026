name: Sync Speakers List

# Sync is complete — workflow disabled. To re-enable, restore the triggers below:
# on:
#   workflow_dispatch:
#   schedule:
#     - cron: "0 9 * * *"
on:
  workflow_dispatch:

jobs:
  sync:
    if: false   # DISABLED — sync is complete; remove this line to re-enable
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to update speakers.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          SPEAKERS_CSV_URL: ${{ secrets.SPEAKERS_CSV_URL }}
        run: python sync_speakers.py

      - name: Commit and push if list changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add speakers.json
          git diff --cached --quiet || git commit -m "chore: sync speakers list [skip ci]"
          git pull --rebase origin main
          git push
