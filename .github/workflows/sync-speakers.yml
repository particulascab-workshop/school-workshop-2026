name: Sync Speakers List

on:
  # Manual trigger - click "Run workflow" on GitHub Actions
  workflow_dispatch:

  # Sync automatically every day at 09:00 UTC (1 hour after participants)
  schedule:
    - cron: "0 9 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit the updated index.html

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          SPEAKERS_CSV_URL: ${{ secrets.SPEAKERS_CSV_URL }}
        run: python sync_speakers.py

      - name: Commit and push if list changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: sync speakers list [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            [ "$i" -lt 3 ] && sleep 5
          done
